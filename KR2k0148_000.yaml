body:
  text: 朝鮮志地理類十外紀之屬提要臣等謹案朝鮮志二卷不著撰人名氏書中稱大明一統志則成於明代也卷首略敘疆域沿革而不標其目以下分六大綱為經曰京都曰風俗曰古都曰古迹曰山川曰樓臺以所屬八道為緯中曰京畿西南曰忠清東南曰慶尚南曰全羅西曰黃海東曰江源西北曰平安東北曰咸鏡皆略如中國地志惟京都但載宫殿曹署而不及城市風俗多載其國典制與故事混而為一又諸道皆無四至八到古迹多雜以神怪頗同小説於體例皆為未協然遺聞瑣事為中國史書所未詳者往往而在頗足以資考證其敘𫐠亦皆雅潔較諸州郡輿圖冗漫無緒者轉為勝之宋王雲嘗撰雞林志其書不傳徐兢髙麗國經於山川古迹亦略此書出其國人所述當不失真我國家威德覃敷八紘砥屬朝鮮一國道里既近歸化尤先雖號藩封實同郡縣其山川疆域皆宜𨽻籍於職方録而存之亦足備輿記之一種也乾隆四十六年十一月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:9e9f62a90c1b17e8223a38fed1f667e667dd090afd864467c152ba991c7e8eb2
