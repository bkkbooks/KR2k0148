body:
  text: 朝鮮志卷下山川三角山在京畿楊州之境一名華山一名負兒岳自江原道平康縣之分水嶺連峰疊嶂起伏迤邐西至揚州西南為道峯山又為三角山實京城之鎮山也白岳在京都宫城北仁王山在白岳西白雲洞在仁王山麓木覓山即都城南山一名引慶山唐修撰臯易覓以蜜蠶頭峰又名龍頭峰大明一統志稱龍山在楊花渡東岸即此孤立不甚髙然入江心斗㫁四望曠闊無礙為勝最絶故著稱焉漢江在木覓山南古稱漢山河新羅時為北瀆載中祀髙麗穪沙平渡其源出江陵五臺山至忠州西北與逹川合至原州西與安昌水合至楊根西與龍津合至廣州界為渡迷津為廣津為三田津為豆毛浦至京城南為漢江渡自此而西流為露梁為龍山江又西為西江至衿川北為楊花渡陽川北為孔巖津至交河西與臨津合至通津北為祖江入於海龍山江在都城西南十里慶尚江原忠清京畿上流漕轉皆集於此商船賈舶往來不絶西江在都城西十五里黄海全羅忠清京畿下流漕轉所集之地楊花渡即西江下流楮子島在三田渡西江水岐為二派環島洄伏而出島上松林䓗鬰其中寛平可居石泉湧出最為幽絶栗島在麻酒南蒔藥種栗箭郊在都城東七八里許三面圍山一面帶水平蕪極目水草肥饒官馬放牧之地有亭曰華陽取歸馬華山之義右都城近處冠嶽山在果川西五里鎮山青溪山在廣州西五十里松岳山開城府鎮山又稱鵠嶺在府北五里紫霞洞在松岳山下洞府幽阻漢水清漣殊為蕭洒進鳳山在府東南内外杜鵑花盛開世稱進鳳山躑躅天磨山在府北諸峰崷崪挿天望之凝翠謂之天磨聖居山在府西北黄海道牛峯縣境與天磨山相連一名九龍山又名平那山上有五峯其峯各有小菴稱五聖昔聖骨將軍居扶蘇山右谷一日與同里九人捕鷹㑹日暮就宿岩竇有虎當竇口大吼十人相謂曰虎欲啗我輩試投冠使見攬者當之遂投之虎攬聖骨冠聖骨出欲與虎鬭虎忽不見而竇崩九人皆不得出聖骨還報平那郡郡人來葬九人先祀山神其神見曰予以寡婦主此山幸遇聖骨將軍欲與為夫婦共理神政請封為此山大王言訖與聖骨俱隱不現郡人因封聖骨為大王立祠祭之以九人同亡改山名曰九龍聖骨之孫寶育出家入智異山修道還居此山之北岬大興洞在天磨聖居兩山之間樹木蓊鬰泉石光潔夏則緑隂蓋地木蓮花開清香滿洞秋則赤楓黄葉倒映水底真佳境也朴淵在天磨聖居兩山之間狀若石瓮窺之正黒有盤石湧出中心曰島巖水赴絶壁怒瀑下垂可十餘丈宛如白虹映空飛雪洒矼霆奔電激聲震天地諺傳昔有朴進士者吹笛淵上龍女感之引以為夫故名朴淵其母來哭墜死下潭遂名姑姆潭淵上有神祠遇旱禱雨輒應髙麗文宗嘗遊此登島嵓上忽風雨暴作石震動文宗驚怖時李靈幹扈從作書數龍之罪投於淵龍即出其脊乃杖之淵水為之盡赤五鳳峰在開城府峯下有寺名曰甘露髙麗李子淵入元朝登潤州甘露寺愛湖山勝致謂從行三老約曰肅宜審視形勢載胸臆間及還與三老約曰天地間凡有形者無不相似况我國山川清秀其形勢豈無與京口相近者乎汝宜以扁舟短棹無逺不尋當以十年為期三老曰唯凡六涉寒暑始得之於府城西湖潤州甘露寺雖美但營構繪飾之工特勝耳至于天作地生自然之勢殆未及此凡樓閣池臺之制度一倣潤州禮成江在府西三十里髙麗朝宋皆於此發船故謂之禮成碧瀾渡在府西三十六里宋史自急水門又三日抵岸有館曰碧瀾亭由此登陸﨑嶇四十餘里乃其國都者是也今稱息波亭天寳山在楊州東二十五里山有檜若寺髙麗時西域僧指至到此云山水之形宛同天竺阿蘭陁之寺後僧懶翁始建寺末畢而死其徒覺田等訖工為屋凡二百六十二間棟宇像設宏狀美麗甲於東方驪江即漢江上流在驪州客館北臨江有樓曰清心沿江有長林曰八大藪周十餘里登樓望之如在畫圖中龍門山在楊根郡東三十三里一名彌智山月溪遷在郡西三十里縈紆山腹下臨江水俗稱棧道為遷五冠山在長湍府西三十里山頂有五峰團圓如冠故名髙麗人事母至孝居山下去京三十里為養禄仕朝出暮返告面定省不少衰歎其母老作木鷄歌名曰五冠山曲傳于樂譜山下有靈通寺洞府深邃山勢周遭流水漫廻樹木蓊鬱其西樓勝㮣為松都第一遮日巖在五冠山下綿紬洞口有巖石平廣可坐鑿石為窠􅍫人言古人張幕立柱處或云仙人所遊或云君王所幸有泉盤回其駛如箭其下為泓泓底皆石羣魚潑刺厯厯可數花巖在五冠山下靈通洞口一名花潭左有翠壁峭立如展畫屏岩隙有躑躅當春亂發紅映水底潭右有小嵓四面如削其上四隅亦有張幕窠臼湧巖山在五冠山東北山與天磨聖居諸山相連絶壁峭立三面如削岩㟼之間有寺名曰洛山惟南面獨開恍如天造寺東有一獨峰髙挿霄漢上戴盤石曰正瓶臺寺南又有一峯曰香爐峰成化乙酉春夜有聲如雷寺僧皆震怖明日視之則寺後石岡自折移立東門外屹然與兩峰鼎峙寶鳳山在府西二十里檜嶺東山勢如鳳鶱舞故名石壁府東三十里有長湍渡一名頭耆津即臨津上流兩㟁青石壁立周遭十里清江瀉其中瑩徹可鑑春花秋楓紅緑倒影乗舟望之宛如仙境臨津渡在府南三十七里其源出咸鏡道安邊府界扶蘇山在豐徳郡十五里山有敬天寺有石塔十三層刻十二㑹相人物聳動形容森爽其制作精巧天下無雙諺傳元脱脱丞相以為願刹晉寧君姜融募元朝工匠造此塔至今有脫脫姜融畫像又寺之東岡産怪石俗謂之沈香石孔巖津一名北浦在陽川有巖立水中有竇因以為名髙麗恭愍王時有民兄弟偕行弟得黄金二錠以其一與兄至津同舟而濟弟忽投金于水兄怪而問之荅曰吾平日愛兄篤今而分金忽萌忌兄之心此乃不祥之物不若投諸水而忘之兄曰汝之言誠是矣亦投金於水右京畿屏風山在清風郡北一里蒼壁削立如屏周遭五六里大川縈迴其下山腰有風穴城山在永春縣南三里山下有石窟髙丈餘廣可十餘尺許深入無際涯有水混混而出深可沒膝清冷如氷邑人持炬十柄而入穴猶未竟炬盡而返椒水在清州東其味如椒而冷似氷浴則已疾俗離山在報思縣東九峰突起亦名九峰山新羅時稱俗離岳躋中祀山頂有文藏臺疊石天成贔屭聳空其髙不知其幾丈其廣可坐三千人臺上有坎如鑊其中有水混混旱不縮雨不肥分為三派流泝半空一派東流為洛東江一派南流為錦江一派西流而北為逹川入于金遷山下有八橋九遙之號山之南岸紆餘開豁自此至彼望之遙遙疑其地盡而至則又望遙遙如此九轉而乃抵于法住寺故名九遙九遙之中一水回環曲轉每曲有橋總八故名八橋第一橋曰水精橋橋上有飛閣人從閣中行黄山一云天䕶在連山縣東新羅金庾信將兵與唐蘇定方攻百濟百濟將軍階伯禦羅兵于黄山之野設三營四戰皆勝兵寡力屈而死甄萱從髙麗太祖討其子神劒神劒兵敗而降萱憂懣發疽數日卒于黄山佛舍白馬江在扶餘縣西良丹浦及金剡川與公州之錦江合流為此江入林川郡界為古多津藏軍洞在石城縣北洞門曲狹行人見之疑若無洞罙入其内極廣濶可藏萬餘兵世傳唐將蘇定方伐百濟時藏兵于此故因以為號元帥山在燕岐縣南髙麗忠烈王十七年哈丹侵軼王請兵于元世祖遣平章薛干領兵來助王以韓希愈金忻等將三軍偕元兵與丹戰于縣北清州之界正左山下大捷追至公州熊津伏尸三十餘里斬獲不可勝計俗至今呼駐軍之地為元帥山温泉在温陽郡西水熱如沸湯療病有效右忠清道開雲浦在蔚山郡南新羅憲康王遊崔城至海浦忽雲霧晦冥迷失道禱于海神開霽因名焉七㸃山在三乂水之間山有七峰如㸃故名世傳駕洛時旵始仙人所遊之地金井山在東萊縣北山頂有石髙可三丈上有井圓十餘尺深七寸許有水常滿旱不竭色如黄金世傳有一金色魚乗五色雲從天而下游泳其中以此名其山温井在縣北其熱可熟鷄子帶病者飲之輒愈新羅時王屢幸于此甃石四隅立銅柱其穴猶存内迎山在清河縣北山有大中小三石鼎列于岩上人稱三動石以手指觸之則微動兩手據撼則不動新羅真平王避甄萱亂于此山龍頭山在寧海府西二十里其頂有井水旱無增減俗傳初山頂有一葦長至天乃鑿井其地水甚清澈邪人照之則變為泥也氷山在義城縣東南四十里大巖下有石穴穴口髙三尺廣四尺八寸横入五尺一寸是為風穴又有穴在岩底直下廣一尺深可量處方一尺其下回曲深淺難量立夏後氷始凝極熱則氷堅霪雨則氷釋春秋不寒不熱冬則温氣如春是為氷穴鼇山在清道郡南二里鎮山東有一谷名曰髙沙洞天將風雨先期而鳴噴出雲氣雲入洞内則雨雲出洞外則風大鳴則即日有騐小鳴則二三日乃驗華山在義興縣東三十里山麓有風穴廣三尺二寸長二尺八寸風自穴出甚寒夏初必氷洛東江在尚州東三十六里聞慶龍淵及軍威并川諸水至州之東北合于龍宫河豊津南流為洛東江入善山府界自此至入海雖隨地異名而總稱洛東江又稱伽倻津恭儉池在州北二十七里髙麗時司録崔正份因舊址築之堤長八百六十步周一萬六千六百四十七尺民賴灌溉之利池中蓮花盛開香風聞數里菱芡被洲渚縣之士人環池岸置亭榭以遊焉鯉埋淵在善山府東十二里東岸有竒岩岩下有龍穴天旱先燔柴于冷山之頂繼沈虎頭于此或祭龍以禱輒應鳥嶺在聞慶縣西二十七里俗號草岾與豐基竹嶺俱為南道雄關龍湫在鳥嶺下桐華院西北一里有瀑布四面及底皆石其深不可測俗傳龍騰處曦陽山在縣南十五里有古城三面皆石壁古有軍倉洞府深邃泉石絶勝串岬遷在縣南二十二里即龍淵之東崖一名兔遷鑿石為棧道縈紆屈曲幾六七里俗傳髙麗始祖南征至此不得路有兔縁崖而走遂開路以行因稱兔遷其北㫁峰有石城遺址古之防戍處伽倻山一名牛頭山在陜川郡北髙麗始祖將興崔致逺上書有鷄林黄葉鵠嶺青松之語新羅王惡之致逺即帶家隱于伽倻山之海印寺吟風瀨泚筆巖俱在海印寺洞是地攅峰四峙怒浪噴風聲如陣馬巨石臨溪苔蘚不蝕滑如磨礱可施鉛毫故名皆致逺所遊處致逺即入唐為髙駢幕下作檄黄巢書者也水落巖在龍川縣東十三里栗川峴山南溪水流入山腰岩石間作瀑布數十丈分三派直下垂土人以為全羅道將旱則西派竭慶尚道將旱則東派竭忠清道将旱則中派絶流以此占來歲水旱右慶尚道萬景臺在全州府東南十里髙徳山北麓有石峯竒秀狀如層雲其上可坐數十人四面林木森鬱石壁如畫西望郡山島北通箕凖城東南負太山氣象千萬羣山島在萬頃縣西海中周六十里迴迂可以藏船凡漕運往來者皆候風于此島中有大塚如君王陵者大明一統志十二峯連絡如城舊有客館曰郡山亭及五龍山廟邊山在扶安縣西二十五里一名瀛洲山峰巒盤回百餘里重叠髙峻岩谷深邃宫室丹鉛之材自髙麗皆取于此俗傳虎豹見人即避夜行無阻無等山在光州東十五里鎮海一云武珍岳一云瑞石山穹窿髙大雄盤五十餘里濟州漢拏山慶尚道南海巨濟等島皆在眼底山西陽崖有石條數十櫛立髙可百尺山名瑞石以是也天旱欲雨與久雨欲晴山輒鳴聲聞數十里月出山在靈巖郡南五里諺稱小金剛山九井峰月出山最髙頂有岩屹立髙可二丈旁有一穴僅容一人從其穴而上其巔可坐二十人其平處有凹而貯水如盆者九號九井峯雖旱不竭諺傳九龍所在動石九井峯下有三石特立層岩之上髙可丈餘周可十圍西負山巔東臨絶壁其重雖用千百人不能動搖而一人搖之則欲墜而不墜故亦稱靈石郡之得名以此漢拏山在濟州南二十里鎮山其曰漢拏者以雲漢可拏引也其巔有大池人喧則雲霧咫尺不辨五月雪猶在八月乃襲裘明月浦在州西六十里海口可泊舟財巖在明月浦西五里其形如屋穹窿其上鋪白沙其下有大穴人以炬入其中寛廣可八十歩許産石鐘乳其西北有二岩名小夾財俱産石鍾乳其中寛廣亦五十步許智異山在南原府東六十里山勢髙大雄據數千里女真白頭山之脈連延至此故又名頭流一名方丈杜詩方丈三韓外註及通鑑輯覽皆云方丈在帶方郡即南原之南者是也新羅為南岳躋中祀環山而居者凡數十州其北則咸陽其東南則晉州其西則南原竒峰峭壁不可勝筭天王峯般若峰最髙山腰或有雲雨雷電其上則晴朗諺傳太乙居其上羣仙之所㑹龍象之所居也東南之山智異金剛最雄大山東有㫁俗寺崔致逺讀書處青鶴洞在智異山中路甚隘狹纔通一線人乃曲躬而行經數里許乃得虚曠之境四隅皆良田沃壤宜播植唯青鶴棲息其中故以名焉盖古之遁世者所居頹垣壊塹猶在諺傳崔致逺所遊處馬耳山在鎮安縣南七里有一石山雙峰聳立名曰湧出峰東曰父西曰母相對如削成髙可千仭其頂樹木森鬱四面峻絶人不能升惟母峰北崖可升諺傳東峰上有小池西峰頂平濶有泉可避冦天旱禱雨有應新羅稱西多山載小祀我恭定王南幸次山下遣官致祭以形似賜名馬耳山右全羅道急水門在黄州西三十里海口州及龍岡安岳之水相激處葱秀山在平山府北三十里董侍講越奉使到此作記立碑以刻慈悲嶺在瑞興府西六十里一名岊嶺自平壤通京都舊路也多虎害路遂廢今由棘城路以行吾助川在牛峰縣興義驛南源出聖居山源入楮灘岸上有石迤邐如屏髙十丈餘甚竒偉龍渾在遂安郡有巖如口噴出清泉淙淙而流淵淪成深淵冬不氷旱不竭雨亦不溢崖石髙起可坐五六人毫髮皆鑑穴轉而阨狀若咽喉莫敢窺其源九月山在文化縣西十里即阿斯逹山一名弓忽一名甑山一名三危世傳檀君初都平壤又移白岳即此山也至周武王封箕子于朝鮮檀君乃移于唐藏京後還隱此山化為神白沙汀在長淵縣西五十八里長七八里廣三四里南有蓮池北有勝仙峰峰頭有莎草三面濱海白沙平鋪隨風流轉堆積成岸地産海棠紅翠相映遊賞者相属右黄海道五臺山在江陵府西一百四十里東滿月南麒麟西長嶺北象王中智爐五峰環列大小均敵故名之于筒水在五臺山西臺之下有泉湧出即漢水之源仙遊潭在杵城郡南十一里許山麓周遭成谷谷中有潭曰仙遊有小峰斗起半入湖心上有長松數株舊有亭今廢春則躑躅夾巖亂發夏則蓴菜滿潭永郎湖在郡南五十五里周三十餘里汀回渚曲巖石竒怪湖東小峰半入湖心有古亭基是永郎仙徒遊賞之地烈山湖在郡烈山縣東二里有大湖周數十里包跨陵谷比諸湖最大諺傳昔大水包烈山之谷新羅構山麓而舊縣沈在水底天晴波静則牆壁依然可見鳴沙在郡南十八里沿海沙平皓若雪色人馬行則觸之有聲錚錚如金磬響大抵嶺東皆然而杵城高城之間最多海棠間發紅白相映浦口山在髙城郡東九里髙城浦有岩斗起層叠如階其上可坐百餘人岩北又有一峯皆石東望海中五里許有石拳如列屏峯下有石龍拏虎攫竒怪異常又有二石相對如人偶語石皆白色輝映碧海望之如畫三日浦在郡北七八里外有重峰叠嶂合包而内有三十六峰洞壑清淵松石竒古水中有小島蒼石盤陁其上虬松鋪隂梨花亂開湖水明瑩可鑑非烟火食者所堪至昔四仙遊此而三日不返故得是名水南又有小峯峯有石龕峯之北崖石面有丹書六字曰永郎徒南石行書畫入石風磨雨洗宛然如新世傳永郎仙徒所書昭陽江在春川府北六里源出麒麟之瑞和縣與府之麒麟縣水合流至楊口縣南為草沙里灘又至府東北為青淵為丹淵為狄岩灘為昭陽江寒溪山在麒麟縣東五十里山下有城有川自城中流出即成瀑布而下懸流數百尺望之如白虹垂天自圓通驛而東左右皆大山洞府深邃溪水縱横而渡者三十六樹木如簣上竦雲霄旁無横枝松栢尤髙不見其巔又其南峰作絶壁其髙千仞竒怪莫狀禽鳥不能飛度其下清泉觸巖成潭盤石平向可坐又東數里洞口甚狹細徑縁崖窾穴唅呀峰巒峭拔如龍拏虎攫如累層臺者無數其形勝甲於嶺西金剛山在淮陽府東一百六十七里山名有五一曰金剛二曰皆骨三曰浧搫四曰楓岳五曰怾怛白頭山南條也自㑹寧府之亐羅漢峴至甲山東為頭里山永興西北為劍山府之西南為分水嶺西北為鐵嶺通川西南為楸池嶺至長楊之東髙城之西為此山自分水嶺至此凡八百三十餘里山凡一萬二千峰巖㟼骨立東臨滄海杉檜參天望如畫圖有日出月出二峯可見日月之出内外山共有百八寺表訓正陽長安摩訶衍普徳窟榆岾最為名刹云萬瀑洞在金剛山中百道流泉湧出谷中其狀非一故名谷口有峰曰玉人峯人言青鶴棲其隈有一泓曰觀音潭潭畔石崖蒼苔滑足人皆捉藤蔓乃得過其名曰手巾崖石心有凹如杵􅍫諺傳觀音浣帨處至普徳窟前飛湍縈石來觸崖窾飛雪噴激晴晝欲暝石底水蔚如翠藍尺數步怒瀑飛珠散雪噴薄而下其大者凡十二層其小者不可勝計故曰萬瀑洞其下曰珠淵又有一石形如龜伏潭中曰龜潭又有一潭深不可測曰火龍潭其上有峰曰獅子岩洞有普徳窟鑿絶壁架枝立銅柱于外以構小屋三楹于其上名曰觀音門拘以鐵鎖釘于巖石浮在空中人登則搖中置佛函飾以珠玉外施鐵網以防手摸右江原道龍興江在永興府東北二里古名横江其源有四一出沸流水一出馬踰嶺一出艾田峴一出陽徳縣境居次嶺至庫岩與松魚灘合名横川過龍神堂至鎮静寺西絶壁下名鶬鶊淵下有廣灘中有白石形如白馬以石隱見知水深淺經邑城東北為此江南流入海國島在安邊府東六十里島去岸十里許入自西南隅水際白沙如練其下平地五六畆形若半壁中有屋基人言浮圖者所居也其上山圍若映勢不甚髙蔓草覆之又無樹木視之一土坡也舟而少西崖岸稍異其崖石則皆方直櫛比而壁立其岸石則皆平圓排列一面可坐一人然不整齊也行數百步其屋髙可數百尺其石白滑方直長短若一皆井井離立每一條其頂各戴一小石若華表柱頭者仰面而視可竦可愕有一小窟撑舟而入漸窄不能容舟視其窟深不可測其左右竦立之石如外面更整齊其上石脚下垂者皆平正如覆棋局若一一鉅而㫁之又有一面如圍屏者石與窟無異而崖不甚髙其下稍平易其圓石排列者可坐千人遊觀者必憩息于此東南又行數百步崖石稍異作方鐵網盛水磨小圓石長五六十尺人謂鐵網石造物竒怪難以言殫磨雲嶺磨天嶺俱在端川郡以其髙峻勢入雲天故名東北雄關白山在鏡城府西一百十里山勢甚峻至五月雪始消七月復有雪山頂樹木矮小土人亦謂之長白白頭山在㑹寧府西七八日程山几三層髙二百里横亘千里其巔有潭周八百里南流為鴨緑江北流為松花江為混同江東北流為蘇下江為速平江東流為豆滿江大明一統志東流為阿也若河疑指速平江也右咸鏡道錦繡山在平壤府五里鎮山山下有髙麗長樂宫基牡丹峰在錦繡山徳巖在大同門外屹然能捍水故府人徳之而名酒巖在府東北十里諺傳酒流出巖間遺痕尚在因而得名大同江在府東一里一名浿江又名玉城江其源有二一出寧逺郡加幕洞南流至孟山縣北又折而西流至徳川郡界與三灘合而南流至价川郡界為順川江至順川郡界為城岩津至慈山郡界為禹家淵自北而東流至江東郡界為雜派灘一出陽徳縣北文音山西南流至城川府界為沸流江又折而南流至江東縣界與雜派灘合流為西津江至府城東北為馬灘至府城東為銀灘又為大同江自此而西流為九津溺水下與平壤江合流至中和縣西為梨津江至龍岡縣東出急水門入海白銀灘在府東北四里綾羅島周十二里在白銀灘北鳳徳山在安州東二十里山頂有九層鐵浮屠清川江一名薩水源出妙香山經安州北城下西流三十里與傳川江入海隋宇文述等伐髙勾麗師渡薩水去平壤城三十里因山為營因乙支文徳詐降還軍至清川江軍半渡文徳追擊其後軍殺右屯衛將軍辛世雄隋軍俱潰所謂隋兵百萬化為魚者此也堂於嶺在定州西十五里郭山郡界西門嶺在嘉山郡西二里俗名石門嶺鳳頭山在郡北一里鎮山白馬山在義州南三十里諺傳白龍馬出遊故名鴨緑江在州西北一名馬訾一云清河一曰龍灣西去遼東都司五百六十里其源出於長白山流至州北於赤島東分三派一南流滙為九龍淵名曰鴨緑江水色似鴨頭故名之一西流為西江一從中流名曰小西江至黔同島復合為一至水青梁又分二派一西流與狄江合一南流為大江繞威化島至暗林串西流至彌勒堂復與伏江合為大摠江入于西海朱子曰女真起處有鴨緑江傳云天下有三處大水曰黄河長江鴨緑是也髙皇帝詩鴨緑江清界古封强鋤詐息樂時雍逋逃不納千年祚禮義咸修百世功漢代可稽明載冊遼征須考照遺蹤情懐造到天心處水勢無波戍不攻龍骨山一名龍虎山在平安道龍川郡東八里鎮山西臨大海北望鴨緑江江外松骨諸山如在几案之下最為絶勝龍岩在龍川郡西四十五里潮水往來岩上有龍爪痕劍山在宣川郡西二十里峰巒嵳峩如劍䤥故名凌漢山在郭山郡東北七里鎮山大明一統志作熊花山妙香山在寧邊府東一百三十里一名太伯山山之大莫之與比地多貞木冬青仙人舊跡存焉博川江古稱太寧江大明一統志作大定江在博川郡西十五里源出昌城府浮雲山過泰川縣合于安州之老江入于海劍鶴山在成川府東八里鎮山左右絶壁如劍如鶴故名檜山在成川北七十里石壁周三十里中有赤墳平衍巨川横流其下諺稱天作之城可容千兵絶骨山在府西北二里有攅峰十二世謂之巫山十二峰沸流江即卒本川俗稱遊車衣津在成川客館西三十步其源二一出陽徳縣吳江山一出孟山縣大母院洞至府北三十里合流厯絶骨山下山底有四石穴水入穴中通流沸騰西出故名沸流江又與慈山郡禹家淵合入于大同江狄踰嶺在江界府南二百六十九里熙川郡界即咸鏡道鏡城府白山西麓西北雄關右平安道樓臺濟川亭在都城南十里許前臨漢江後據木覓南對青溪冠岳諸山望逺亭在楊花渡北岸每歳省農及觀水戰處樂天亭在都城東十餘里乃春秋省農閱武之所七徳亭在漢江西白沙汀春秋講武處狎鷗亭在豆毛浦南岸上黨府院居韓明澮别墅明澮嘗奉使入中朝請名於翰林學士倪謙謙扁以狎鷗而為之記後復奉使入中朝求詩于縉紳武靖侯趙輔等數十人亭名遂聞于中朝淡淡亭在麻布東岸安平君别墅今廢右都城近處雲錦樓在水原郡客館東樓前有池深廣夏月芙蕖盛開故名清心樓在驪州客館北俯臨驪江北有八丈藪西有笠岩髙可二十餘丈上有松亭樓之東北五里許有神勤寺晨昏鐘磬常開于樓中迎賓館在驪州客館東岸髙爽開豁與清心樓相對俱為絶勝臨津亭在坡州臨津南岸右京畿雲錦樓在江寧府客館北巋然傑特制度竒偉樓南有池深廣蒔以芙蕖池中有島島上種竹勵節堂在府館西北府使趙云仡有惠政邑人立祠祭之俗呼生祠堂寒松亭在府東十五里東臨大海蒼松鬱然亭畔有荼泉石竈石臼即述郎仙徒所遊處鏡