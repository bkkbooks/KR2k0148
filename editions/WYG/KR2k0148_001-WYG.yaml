body:
  text: 朝鮮志卷上檀君肇國箕子受封皆都平壤漢置四郡二府自是三韓𤓰分馬韓統五十四國辰卞韓各統十二國厥後新羅高勾麗百濟三國鼎峙新羅之地東南至海西至智異山北至漢水髙勾麗東至海南至漢西北踰遼河百濟西南至海東至智異山北至漢新羅滅髙勾麗百濟及其衰也弓裔據鐵原稱後髙勾麗甄萱據完山稱後百濟髙麗始祖統合三韓西北以鴨緑為限東北以先春嶺為界至我康獻王建都漢陽定為八道中曰京畿西南曰忠清其西抵大海皆古馬韓之域髙勾麗百濟分據其地東南曰慶尚其東南抵大海本辰韓之地南曰全羅其南抵大海本卞韓之地後為百濟所有西曰黄海其西抵大海古朝鮮馬韓舊地後為髙勾麗所有唐髙宗滅髙勾麗不能守其地新羅遂并之及季世為弓裔所據髙麗始祖盡有其地東曰江原其東抵大海本獩貊之地後為髙勾麗所有西北曰平安西抵鴨緑江北接羯本朝鮮故地後為髙勾麗所有新羅文武王與唐將李勣攻滅之東北曰咸鏡東抵豆滿江北接羯本髙勾麗之地八道之中忠清慶尚全羅三道地廣物衆州郡雄巨最為富庶俗尚詩書人才之出比諸道倍多平安咸鏡二道境接羯俗尚弓馬兵卒精彊京都北鎮華山有龍蟠虎踞之勢南以漢江為襟帶左控關嶺右環渤海景福宫即王宫勤政殿受朝正殿思政殿在勤政殿北接引士大夫講論治道之所康寧殿在思政殿北交泰殿在康寧殿北含元殿在康寧殿西北養心堂在康寧殿西丕顯閣在思政殿東偏夜引講官論難經史之所麟趾堂在交泰殿東紫薇堂在交泰殿東清讌樓在交泰殿東忠順堂在後苑王常不忘朝廷揭此名堂以寓敬順之誠隆文樓在勤政殿東隆武樓在勤政殿西慶㑹樓在思政殿西環樓為池池深廣種芙渠中有二島欽敬閣在康寧殿西鑄銅為山髙七尺許置閣中内設巧機用玉漏水激之使自輪轉五雲繞日朝夕出没又設司辰武士玉女及十二神之儀每時至武士撃鐘玉女奉時牌而出十二神各於方所輙自起立時盡則玉女還入神亦還伏其運若神莫測其妙山之四靣陳豳風四時之景以為候象授時敬天勤民之所報漏閣在慶㑹樓南設座二層三神在上司時者撞鐘司更者撃鼓司㸃者扣鉦十二神在下各執辰牌時至自出時盡還入皆刻木為像激水為機不假人力隨時自報不差毫釐為術最妙街中鐘鼓晨昏之節皆以此傳撃簡儀臺在宫城内西北隅築石為臺繚以石欄置簡儀其巔臺西植銅表斵青石為圭圭面刻丈尺寸分乃用影符取日中之影推得二氣盈縮之端又於昌徳宫西麓起瞻星臺置小簡儀觀天象察氛祲候雲物通衢之側築臺置仰釡内刻周天度數畵十二神外列方位設衡南北衡腰穿小竅以測日晷使愚民知時早晩資善堂世子引僚屬講讀之所在東宫昌徳宫在景福宫東王之别宫仁政殿受朝正殿宣政殿在仁政殿東亦講論治道之所匪躬堂在延英門南昌慶宫在昌徳宫東明政殿受朝正殿文政殿在明政殿南仁陽殿在明政殿西景春殿在明政殿北通明殿在景春殿北環翠亭在通明殿北倫序亭在後苑常接王親兄弟諸君之所社稷壇在京城内西先農壇在東郊先蠶壇在東郊厲壇在北郊宗廟在京城内東文廟在成均館明倫堂之南慕華舘在城西郊外館前立迎詔門以寓尊敬朝廷之意各司宗親府宗室諸君之府議政府總百官平庶政理隂陽經邦國忠勲府諸功臣之府儀賓府尚王女者之府敦寧府王親外戚之府義禁府掌奉教推鞫之事吏曹掌文選勲封考課之政户曹掌户口貢賦田粮食貨之政禮曹掌禮樂祭祀宴享朝聘學校科舉之政兵曹掌武選軍務儀衛郵驛兵甲器仗門户管鑰之政刑曹掌法律詳讞詞訟奴𨽻之政工曹掌山澤工匠營繕陶冶之政漢城府掌京都口帳市㕓家舎田土回山道路橋梁溝渠逋欠負債鬬毆晝廵檢屍車輛等事司憲府掌論執時政糾察百官正風俗申寃抑禁濫偽等事開城府掌治舊都忠翊府原從功臣之府承政院掌出納王命為任甚重必選堪為宰相者為之由是而陞為六曹㕘判及二品諸職掌𨽻院掌奴𨽻簿籍及决訟之事司諫院掌諫諍論駁之事宏文館掌内府經籍及書筵文翰之任其選最重議政府館閣吏曹共議掄揀然後方許除授更日値宿講劘治道分御膳賜宫醖以寵之藝文館掌制撰辭命成均館掌儒學教誨作成人才之任尚瑞院掌印章符牌節鉞春秋館掌在王左右書言動記特政承文院掌事大咨表文書通禮院掌朝儀排班引接奉常寺掌祭祀議謚等事宗簿寺糾察宗室愆違之任校書館掌印頒經籍及香祝印篆之任司饔院掌供御膳及内府供餉等事内醫院掌和劑御藥尚衣院掌供御衣襨及内府財貨等物司僕寺掌輿馬厩牧之任軍器寺掌造兵器火炮等事内資寺掌内供米糆酒醤油蜜内贍寺掌諸宫殿俱進酒醪司䆃寺掌御廩米糓禮賓寺掌賔客宴享宗宰供饋常監視議政府官飯食進案時親自助舉司贍寺掌造楮貨及貢布等事軍資監凡四所掌軍需儲積都中有二倉漕運所㑹江上有二倉濟用監掌進獻紬布人参毛皮及綵染織造等事繕工監掌土木營繕司宰監掌魚鹽燒木杻炬掌樂院掌教閱聲律觀象監掌天文地理測候刻漏等事典醫監掌醫藥司譯院掌譯諸方言語世子侍講院掌侍講經史規諷道義宗學掌宗室教誨脩城禁火司掌宫都城脩築宫殿公廨坊里救火典設司掌帳幕排設等事豐儲倉掌米豆草芚紙地等物廣興倉掌百官禄俸工匠軍兵雜務廩給典艦司掌京外舟艦典㳙司掌治宫庭社稷署掌洒掃壇壝宗廟署掌守衛寢廟平市署掌勾檢市㕓平斗斛丈尺低昻物貨司醖署掌酒醖義盈庫掌油蜜黄蠟素物長興庫掌席子油芚紙地氷庫掌藏氷掌苑署掌苑囿花果司圃署掌園圃蔬菜養賢庫掌成均儒生供餉米豆典牲署掌養犧供祭祀司畜署掌飼雜畜供宴享造紙署掌造表箋咨文紙及諸般紙惠民署掌醫藥療民庶疾病圖畫署掌繪畫之事典獄署掌獄囚活人署掌救活都城病人凡病人無歸者官給粥料藥物冬給燎炭夏給氷瓦署掌道瓦磚歸厚署掌棺槨供卿相禮葬者及士大夫賜與民庶貧乏者亦給中學掌訓誨小學之士他學同南學東學西學中部掌管内檢察非法及橋梁道路里門警守家代打量人屍檢騐等事他部同東部南部西部北部中樞府凡宰相或因病事故解務者授之以示優待五衛都總府掌治五衛軍務訓錬院掌科試武士習讀武經錬閱軍陣世子翊衛司掌陪衛東宫讀書堂在東湖幽静處妙遴年少文學有重望者除本職任仕務輪畨而徃内府書籍隨意探討使之温習涵養以為後日大用地凡鋪設什器紙硯筆墨饌飯酒醴燈燭諸具無一不備每遣中使賜御醖珍膳以示寵異膺此選者時人擬之登蓬瀛風俗崇尚信義篤好儒術禮讓成俗柔謹為風士大夫䘮葬祭禮一依朱文公家禮父母之䘮率皆廬墓三年若有不謹者不齒士列其間或有啜粥終䘮不食塩菜或手自炊㸑以供奠事昏娶必通媒納采不娶同姓士大夫皆立家廟四時仲朔必享忌日則子孫不食肉祭其主於寢堂六品以上祭三代七品以下祭二代庶人只祭考妣若嫡長子無後則衆子衆子無後則妾子奉祀旁親無後者祔祭嫡妾俱無子者告官立同宗支子為後士族婦女夫死則守節終身士大夫妻亡者三年後改娶若因父母之命或年過四十無子者許期年後改娶每歲王祀先農躬耕籍田以供粢盛王妃享先蠶養蠶於後苑以率女工每歲季秋王行養老宴參宴者皆除一級孝子順孫義夫拜餉之王妃宴婦人於内殿拜餉節婦皆有賜物年百歲以上者嵗賜米堂上官以上年滿七十者功臣父母妻堂上官妻並月致酒饌二品以上年尊徳卲者春秋賜宴謂之老英㑹孝友節義烈女隨其行跡或賞職賞物或旌門復户清白吏見存者褒奬身殁者子孫亦皆録用戰亡人子孫亦存恤録用宗親大臣之卒舉哀輟朝遣官弔祭官庀䘮事因公在外身死者亦致賻祭宗室雖秩卑期親以上亦皆弔賻營葬侍講官及臺諫勿論品秩髙卑一皆賻給遭親䘮者亦如之設歸厚署備棺槨以周民間倉卒之需敗常犯贓者婦人再嫁者書名三司其子孫不齒士類五子登科者之親歲賜米殁則致祭贈爵中文武科者賜恩榮宴其親存者則令所在官給酒樂以榮之名曰榮親宴殁則設祭謂之榮墳中第一名者賜米凡民因貧乏過期未葬者昏嫁失時者皆給資財饑寒孤獨者與老而無托者亦給衣料宏文館官員更日直宿王日開講筵宰相臺諫亦令輪參又有夜對以盡羣下之情官至一品年七十而係國家輕重者不許致仕賜教書几杖以優之堂上官實行二品以上職者視其秩追贈三代士大夫及軍卒父母年七十則一子歸養八十則二子歸養九十則諸子歸養每歲夏月頒氷於宗親及文武堂上官堂上官年老在散者活人署病刑獄囚人並給歴代及本國忠臣孝子烈女所行卓異者裒撰成書名曰三綱行實譯以方言廣頒中外使婦人小子無不曉解國中設成均館及設養賢庫常養生貟進士五百人景年居館力學篤行而屢舉不中年滿五十者叙職雖非生貟進士通小學四書一經者亦升補於館東西四坊各有學舎教卿大夫子弟及凡民俊秀年八歲以上者閭巷小童不得肄學者設童䝉教誨州郡亦設鄉校皆倣成均四學之制觀察使巡到其邑師長儒生皆試講製課勤惰以勸懲春秋釋菜觀察使守令親行之又大饗儒生成均館儒生每歲春秋議政府六曹諸館閣堂上官命題製述科次置簿優等者三人直赴文科覆試成均館升補儒生及四學諸生每年六月定考官逐日製述或講論通考優等者五十人許赴生貟進士覆試諸道亦然世子逐日問安視膳與師傅賓客僚屬日三講論凡接師傅時下階迎送每月十五日㑹講必設大餉一書講畢則大設宴餉又有賜物新除授京外堂下官職者參謁於議政府吏曹屬曹毋過十日立崇義殿以前朝王氏之後主之給廩禄祭田以奉其祀前代新羅百濟髙勾麗王陵官禁田柴歴代始祖及有功徳及民者皆立廟降香祝令所在官春秋致祭設厲壇於北郊漢城府官每春秋徧祀無主孤魂州郡亦如之囚人冬月則給鋪席夏月則凈脩獄中洗灑枷杻使無寒凍熏蒸之患又定醫官備藥物救之貧不能養獄者官給廪料京外置常平倉榖貴則増價以貿布榖賤則减價以賣布以濟窮民又置别倉當春貸民以贍耕種秋償其數以備來歲每年以為常若値水旱凶歉則在在設賑濟場以救之郡縣每歲春秋行鄉飲酒禮又京外小民每里立鄉長家出米布使鄉長掌之春秋設酒共㑹以申其好謂之講信凡有疾病患難交相救䕶若有死䘮備棺槨葬需以庇之曽經三品職及臺諫侍讀官者子孫承䕃每嵗正月試才補官無䕃者之子孫擇其俊秀許三品以上官保舉吏曹更試經書隨才補闕若不稱職拜罪舉主科舉每於子午卯酉年為之設三場初場試論義二篇中場賦表二篇終場䇿問㑹試則初場講四書五經能通者許赴中場試賦表記中二篇終場䇿問通考取之殿試則䇿時務以第高下若遇大慶及王親幸學宫則有别舉王時時親行釋奠或不時幸學與師儒講論或横經問難或行大射禮或親䇿儒生凡中科者殿廷唱榜御前賜酒賜花與葢優人呈戱鼓吹前導三日遊街以榮之若幸學試取即日唱榜者拜賜鞍馬袍笏尤以為榮聖節及正至王率世子百官行望闕禮每遣使上表時王率世子百官行焚香四拜禮王親捧表跪授使者仍下庭鞠躬具黄屋儀仗以出祗送郊外我國赴京使臣或賫奉勑書回還之時結彩棚迎郊外一如華使凡進獻禮物王親自檢視宗親年滿十五入宗學受業每日抽籖講習讀以為課勸禮曹每月考講四學諸生所讀書京外儒生逐日所讀及其師職姓名簿録藏於禮曹每科舉後所訓儒生中及第三人或生員進士十人以上者加階祭服朝服公服一依華制每四時八節日及季夏土旺日鑚木改火遺失小兒漢城府本邑保授願育人官給衣料古都開城府本高勾麗東北忽髙麗始祖自鐡原徙都廣州本百濟始祖温祚王右都右今皆屬京畿稷山本慰禮城百濟始祖温祚王高勾麗東明王第三子東明王薨避琉璃王自卒本扶餘南奔開國建都於此公州本百濟熊川郡文周王自北漢山城徙都至聖王移南扶餘扶餘縣本百濟聖王自熊川來都號南扶餘義慈王時新羅金庾信與唐蘓定方攻滅之唐師既去新羅盡得其地右今皆屬忠清道全州甄萱建都於此稱後百濟益山本馬韓國後朝鮮王箕凖箕子四十一代孫也避衛滿之亂浮海而南至韓地開國仍號馬韓百濟始祖温祚王并之濟州本耽羅國或稱毛羅在全羅南海中右今皆屬全羅道慶州新羅古都始祖赫居世開國建都髙靈縣本大伽倻國自始祖伊珍阿豉王至道說智王凡十六世五百二十年新羅滅之金海府本駕洛國或稱伽倻後改金官國自始祖首露王至仇亥王凡十世四百九十一年仇亥降於新羅東萊縣古萇山國義城縣古召文國清道郡本伊西國慶山縣本梁國尚州本沙伐國開寜縣本甘文國咸昌縣本古寜伽倻國咸安縣本阿尸良國固城縣本伽倻國并為新羅所取右今皆屬慶尚道江陵府本獩國漢武帝元封二年遣將討之定為臨屯郡三陟府本女直國降於新羅春川府本貊國鐡原府本髙勾麗鐡圓郡弓裔起兵取之自松岳郡來都國號泰封右今皆屬江原道平壤府本三朝鮮髙勾麗之故都唐堯戊辰歲有神人降太伯山檀木下國人立為君都平壤號檀君是為前朝鮮周武王克商封箕子於此是為後朝鮮傳至四十一代孫凖燕人衛滿奪其地都王險城即平壤是為衛滿朝鮮其孫右渠時漢武帝遣将討之以王險為樂浪郡龍岡縣本古黄龍國為髙勾麗所并成川府本沸流王松讓故都髙勾麗始祖東明王自北扶餘來都卒本川松讓以其國降右今皆屬平安道古跡面嶽在京都中髙麗肅宗六年命崔思諏尹瓘等相南京之地思諏還言臣等就盧原驛海村龍山等處審視山水不合建都惟三角山面岳之南山形水勢符合古文請于主幹中心壬坐丙向隨形建都從形勢東至大峰南至沙里西至岐峰北至面嶽為界面岳即白岳馬岩影殿在開城府成均館前髙麗恭愍王為魯公主大營影殿于此窮極奢麗今有遺址九齋學堂古基在府北松岳山紫霞洞髙麗顯宗以後干戈纔息未遑文教文憲公崔冲収召後進教誨不倦學徒坌集遂分九齋曰樂聖大中誠明敬業造道率性進徳大和待聘謂之侍中崔公徒凡應舉者必詣徒中學焉及冲殁後凡赴舉者亦皆𨽻名九齋籍中謂之文憲公徒東方學校之興盖由冲始滿月臺在松岳山下髙麗延慶宫正殿前階也遺基尚存延福亭古基在府東大門外山臺岩下髙麗毅宗聞城東沙川龍淵寺南有石壁數仭削立臨川曰虎岩流水渟滀樹木蓊蔚命内侍李唐柱等構亭其側名曰延福竒花異草列植四隅以水淺不可舟築堤為湖日泛舟酣晏徹夜不止羣臣皆大醉挿花倒載而還或沈醉忘歸衛士甚怨率致難歸法寺古基在府炭峴門外崔冲每歳暑月借此寺之僧房為夏課擇徒中及第學優未官者為教𨗳授以九經三史間或先進來過刻燭賦詩牓其次第唱名以入設小酌童冠列左右奉樽俎進退有儀長㓜有序相與酬唱及日暮皆作洛生詠以罷觀者莫不嘉歎右畿内弓樹在光州南門外枝幹輪囷大數十圍髙七十餘尺邑人以發葉早晩占年之豐歉今枯崔氏園在靈岩郡西諺傳新羅人崔氏園中有𤓰長尺餘一家頗異之崔氏女潜摘食之歆然有娠彌月生子其父母惡其無人道而生置之竹林居數十日女往視之鳩鷲來覆翼之還告于父母父母往見異之取而養之及長祝髮為僧名道詵入唐傳一行禪師地理之法而還踏山觀水多有神驗後名其地曰鳩林毛興穴在濟州南二里髙麗史古記云厥初無人物三神人從地湧出長曰良乙那次曰髙乙那三曰夫乙那三人游獵荒僻皮衣肉食一日見紫泥封木函浮至東海濱就而開之内有青衣處女三及諸駒犢五穀種三人以歳次分娶之始播五穀且牧駒犢子孫蕃盛今州鎮山北麓有穴是其地也右全羅道泡母臺在忠州風流山髙數十丈諺傳昔有仙女名薔薇自號泡母常遊其上香滿一洞唐明皇聞之遣道士迎入宫號真完夫人天政臺在扶餘縣北十里許江北絶巘有岩如臺下臨江水諺云百濟時欲拜宰相則書當選者名函封置岩上須臾取看名上有印跡者為相故名或稱政事岩釣龍臺縣北扶蘇山下有一怪石跨于江渚石上有龍攫之跡諺傳蘇定方伐百濟臨江欲渡忽風雨大作以白馬為餌而釣得一龍須臾開霽遂渡師伐之故江曰白馬岩曰釣龍臺落花巖釣龍臺西有巨岩諺傳百濟義慈王為唐兵所敗宫女奔迸登是岩自墮于江故名蘇定方碑在縣西二里唐髙宗遣定方與新羅金庾信伐百濟滅之立石紀功右忠清道始林在慶州府南新羅脱解王夜聞始林樹間有鷄鳴聲遣人視之有金色小櫝掛樹枝白鷄鳴于其下王取櫝開之有小男兒在王喜曰此豈非天遺我令𦙍乎乃収養之名曰閼智以其出于金櫝故姓金氏因名其林曰鷄林因以為國號琴松臺在府金鰲山頂新羅人王寶髙遊樂之處寶髙入智異山學琴五十年自製新調三十四曲彈之有𤣥鶴來舞遂名𤣥鶴琴又云𤣥琴世傳寶髙得仙道鮑石亭在金鰲山西麓鍊石作鮑魚形故名焉流觴曲水遺跡宛然後百濟甄萱攻燒髙欝府逼至郊畿時新羅景哀王與妃嬪宗戚出遊鮑石亭置酒娛樂忽聞兵至倉卒不知所為王與夫人走匿城南離宫從臣伶官宫女皆被陷沒萱縱兵大掠入處王宫令左右索王逼令自盡强辱王妃縱其下亂其嬪妾立王表弟金傳為王瞻星臺在府東南新羅善徳王時鍊石築臺上方下圓髙十九尺通其中人由中而上下以候天文月明巷在府金城南新羅憲康王遊隺城至開雲浦忽有一人竒形詭服詣王前歌舞讃徳從王入京自號處容每月夜歌舞於市竟不知所在時以為神其歌舞處後人名為月明巷因作處容歌處容舞假面以戲萬波息笛新羅神文王時東海中有小山浮來隨波往來王異之泛海入其山上有一竿竹命作笛吹此笛則兵退病愈旱雨雨晴風定波平號萬波息笛厯代傳寶之至孝昭王加號萬萬波波息笛今亡玉笛長尺有九寸其聲清亮俗云東海龍所獻厯代寶之傳至於今玉帶新羅真平王元年有神人降於殿庭謂王曰上帝命我傳賜玉帶王跪受几郊廟大祀皆服之井田在府地新羅時遺基尚存上書莊在金鰲山北髙麗始祖之興新羅崔致逺知必受命上書有鷄林黄葉鵠嶺青松之語羅王聞而惡之致逺即帶家隱居伽倻山海印寺終焉其鑑識之明羅人服之乃以其所居名上書莊皇龍寺在府月城東新羅真平王命所司築新宫於月城東黄龍現其地王疑之改為佛寺號曰黄龍有率居者于寺壁畫老松根幹鱗皴枝葉盤屈鳥雀往往望之飛入及到蹭蹬而落歳久色暗寺僧以丹青補之鳥雀不復至題詩石在陜川郡海印寺洞俗云紅流洞洞口有武陸橋渡橋向寺而行五六里許有崔致逺題詩石其詩曰狂噴疊石吼重巒人語難分咫尺間常恐是非聲到耳故教流水盡籠山後人因名其石曰致逺堂讀書堂在郡伽倻山世傳崔致逺隠伽倻山一朝早起出石遺冠屨於林間莫知所歸海印寺僧以其日薦冥禧寫真留讀書堂堂之遺址在寺西𤓰亭在東萊縣南髙麗鄭叙被譛歸田里乃築亭種𤓰撫琴作歌以寓戀君之意詞極悽惋自號𤓰亭其歌詞至今傳於樂譜右慶尚道棘城在黄州南二十五里髙麗人防紅巾於此盡為賊所殱累經兵燹白骨暴野天隂雨濕鬼物煩寃薰為厲氣轉相侵染民多夭札國家春秋降香祝致祭其患遂絶亐多窟在海州東三十里其窟圓往二丈餘穴暗人持火乃入至五里許其穴屈曲幽深且有水不得窮源諺傳亐多將軍入此穴達於九月山頂之穴相距百餘里窟内燃火至十餘日則燃氣出於九月山穴右黄海道石竈石池石井俱在江陵寒松亭傍四仙游憩之時茶具也酒泉石在原州酒泉縣南道旁有石狀如半破酒槽者世傳石槽舊在西川邊就而飲者無不足焉邑吏憚於往來欲轉置於縣衆共移之忽大雷震石碎為三一沈於淵一不知所在一即此石也右江原道麒麟窟在平壤府浮碧樓下東明王養麒麟馬於此後人立石誌之世傳王乗麒麟馬入此窟從地中出朝天石升天其馬跡至今在石上井田在府外城内箕子區畫井田遺跡宛然青雲橋白雲橋俱在府九梯宫基内束明王時梯也右平安道朝鮮志卷上
